<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BabeChat 台灣 Dashboard</title>
<link rel="icon" href="logo.png">
<style>
:root{--bg:#08080c;--bg2:#0e0e14;--line:#21212c;--txt:#f3f1f8;--muted:#8d87a3;--pink:#ff2d6f;--grad:linear-gradient(135deg,#ff2d6f,#d6249f)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans TC",sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
header{height:56px;display:flex;align-items:center;gap:16px;padding:0 20px;border-bottom:1px solid var(--line);background:rgba(8,8,12,.92)}
.brand{display:flex;align-items:center;gap:11px;margin-right:auto}
.logo{width:36px;height:36px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:19px}
.brand b{font-size:16px;font-weight:800;letter-spacing:-.3px}
.brand b .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.seg{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:4px}
.seg button{border:0;background:transparent;color:var(--muted);font-weight:800;font-size:14px;padding:8px 20px;border-radius:9px;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--grad);color:#fff}
iframe{width:100%;height:calc(100vh - 56px);border:0;display:block;background:var(--bg)}
#lock{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#lock .lg{width:52px;height:52px;border-radius:14px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:4px}
#lock h1{font-size:17px;font-weight:800}
#lock .sub{color:var(--muted);font-size:13px}
#lock input{padding:10px 13px;border-radius:9px;border:1px solid var(--line);background:var(--bg2);color:var(--txt);font-size:14px;width:220px;font-family:inherit}
#lock input:focus{outline:none;border-color:var(--pink)}
#lock .err{color:#fb7185;font-size:12px;min-height:14px}
</style>
</head>
<body>
<div id="lock">
  <div class="lg" style="background:none"><img src="logo.png" alt="BabeChat" style="width:100%;height:100%;object-fit:contain;border-radius:14px"></div>
  <h1><span style="color:var(--pink)">BabeChat</span> 台灣 Dashboard</h1>
  <div class="sub">請輸入密碼</div>
  <input id="pw" type="password" autofocus autocomplete="current-password">
  <div class="err" id="err"></div>
</div>

<header>
  <div class="brand"><div class="logo" style="background:none"><img src="logo.png" alt="BabeChat" style="width:100%;height:100%;object-fit:contain;border-radius:10px"></div><b><span class="g">BabeChat</span> 台灣</b></div>
  <div class="seg" id="viewseg">
    <button class="on" data-v="operations">營運</button>
    <button data-v="marketing">行銷</button>
  </div>
</header>
<iframe id="fr" title="dashboard"></iframe>

<script>
var SRC={operations:"operations.html",marketing:"marketing.html"};
var VIEW="operations";
var fr=document.getElementById("fr");
function load(){fr.src=SRC[VIEW];}
function setView(v){VIEW=v;
  document.querySelectorAll("#viewseg button").forEach(function(b){b.classList.toggle("on",b.dataset.v===v);});
  load();}
document.querySelectorAll("#viewseg button").forEach(function(b){b.onclick=function(){setView(b.dataset.v);};});

// 密碼閘（與內頁共用 sessionStorage 'bc_ok'）
var P="babechat888";
function unlock(){document.getElementById("lock").style.display="none";load();}
function chk(){var v=document.getElementById("pw").value;
  if(v===P){sessionStorage.setItem("bc_ok","1");unlock();}
  else{document.getElementById("err").textContent="密碼錯誤";document.getElementById("pw").value="";}}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")chk();});
if(sessionStorage.getItem("bc_ok")==="1"){unlock();}
</script>
</body>
</html>
